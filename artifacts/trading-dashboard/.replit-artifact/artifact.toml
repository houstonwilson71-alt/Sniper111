kind = "web"
previewPath = "/"
title = "Meme Coin Sniper Dashboard"
version = "1.0.0"
id = "artifacts/trading-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24210

[services.development]
run = "pnpm --filter @workspace/trading-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trading-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/trading-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24210"
BASE_PATH = "/"
