
services:
  postgres:
    image: postgres:16-alpine
    container_name: sniper-postgres
    environment:
      POSTGRES_USER: sniper
      POSTGRES_PASSWORD: sniper
      POSTGRES_DB: sniper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./lib/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sniper -d sniper"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: sniper-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Go backend: serves the Next.js frontend, REST + WebSocket endpoints, and bridges to the Rust engine via gRPC.
  api:
    build:
      context: .
      dockerfile: ./services/api-go/Dockerfile
    container_name: sniper-api
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://sniper:sniper@postgres:5432/sniper
      REDIS_URL: redis://redis:6379
      ENGINE_GRPC_ADDR: rust-engine:50051
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-in-production}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env

  # Rust engine: unified chain listeners, filter, safety, execution and position monitoring.
  # Commented out because Rust compilation is too heavy for this environment.
  # rust-engine:
  #   build:
  #     context: .
  #     dockerfile: ./rust-engine/Dockerfile
  #   container_name: sniper-rust-engine
  #   environment:
  #     ENGINE_GRPC_ADDR: 0.0.0.0:50051
  #     REDIS_URL: redis://redis:6379
  #     SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
  #     JUPITER_API_URL: ${JUPITER_API_URL:-https://quote-api.jup.ag/v6}
  #     JITO_TIP_LAMPORTS: ${JITO_TIP_LAMPORTS:-10000}
  #     BSC_RPC_URL: ${BSC_RPC_URL:-https://data-seed-prebsc-1-s1.bnbchain.org:8545}
  #     LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
  #     BOT_ENABLED: ${BOT_ENABLED:-true}
  #   ports:
  #     - "50051:50051"
  #   depends_on:
  #     redis:
  #       condition: service_started
  #   env_file:
  #     - .env
  #   restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./artifacts/trading-dashboard/Dockerfile
      network: host
    container_name: sniper-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://api:5000
      NEXT_PUBLIC_WS_URL: ws://api:5000/ws
      NEXT_PUBLIC_SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      NEXT_PUBLIC_BSC_RPC_URL: ${BSC_RPC_URL:-https://data-seed-prebsc-1-s1.bnbchain.org:8545}
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - .env

volumes:
  postgres_data:
