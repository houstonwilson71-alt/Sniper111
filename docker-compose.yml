version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sniper-postgres
    environment:
      POSTGRES_USER: sniper
      POSTGRES_PASSWORD: sniper
      POSTGRES_DB: sniper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sniper -d sniper"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sniper-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./artifacts/api-server/Dockerfile
    container_name: sniper-api
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://sniper:sniper@postgres:5432/sniper
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-in-production}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: ./artifacts/trading-dashboard/Dockerfile
    container_name: sniper-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://api:5000
      NEXT_PUBLIC_WS_URL: ws://api:5000/ws
      NEXT_PUBLIC_SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      NEXT_PUBLIC_BSC_RPC_URL: ${BSC_RPC_URL:-https://bsc-dataseed.binance.org/}
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - .env

  listener-solana:
    build:
      context: .
      dockerfile: ./services/listener-solana/Dockerfile
    container_name: sniper-listener-solana
    environment:
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  listener-bsc:
    build:
      context: .
      dockerfile: ./services/listener-bsc/Dockerfile
    container_name: sniper-listener-bsc
    environment:
      REDIS_URL: redis://redis:6379
      BSC_RPC_URL: ${BSC_RPC_URL:-https://bsc-dataseed.binance.org/}
      BSC_WS_URL: ${BSC_WS_URL}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  executor-solana:
    build:
      context: .
      dockerfile: ./services/executor-solana/Dockerfile
    container_name: sniper-executor-solana
    environment:
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      SOLANA_PRIVATE_KEY: ${SOLANA_PRIVATE_KEY}
      JUPITER_API_URL: ${JUPITER_API_URL:-https://quote-api.jup.ag/v6}
      JITO_BLOCK_ENGINE_URL: ${JITO_BLOCK_ENGINE_URL}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

  executor-bsc:
    build:
      context: .
      dockerfile: ./services/executor-bsc/Dockerfile
    container_name: sniper-executor-bsc
    environment:
      REDIS_URL: redis://redis:6379
      BSC_RPC_URL: ${BSC_RPC_URL:-https://bsc-dataseed.binance.org/}
      BSC_PRIVATE_KEY: ${BSC_PRIVATE_KEY}
      PANCAKE_ROUTER_V2: "0x10ED43C718714eb63d5aA57B78B54704E256024E"
      BLOXROUTE_AUTH_HEADER: ${BLOXROUTE_AUTH_HEADER}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:
